; PlatformIO Project Configuration — SHE Water Quality Monitor
; Dokumentasi: https://docs.platformio.org/page/projectconf.html

[env:esp32dev]
platform   = espressif32
board      = esp32dev
framework  = arduino

; Monitor baud rate
monitor_speed = 115200

; Upload speed
upload_speed = 921600

; Build flags
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DBOARD_HAS_PSRAM

; Library dependencies (otomatis diunduh PlatformIO)
lib_deps =
    marcoschwartz/LiquidCrystal_I2C@^1.1.4
    bblanchon/ArduinoJson@^7.0.0

; Partition scheme untuk OTA (opsional)
; board_build.partitions = default.csv
